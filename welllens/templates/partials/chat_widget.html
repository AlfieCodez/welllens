{# WellLens support chatbot. Self-contained; /chat is CSRF-exempt so it works
   for logged-out visitors too. #}
<style>
  .wl-chat-btn {
    position: fixed; right: 22px; bottom: 22px; z-index: 1000;
    width: 56px; height: 56px; border-radius: 50%; border: none; cursor: pointer;
    background: var(--green, #41613A); color: #F6F3EC;
    box-shadow: 0 8px 24px rgba(65,97,58,.3); display: grid; place-items: center;
    transition: transform .15s ease;
  }
  .wl-chat-btn:hover { transform: translateY(-2px); }
  .wl-chat-btn svg { width: 26px; height: 26px; }
  .wl-chat-panel {
    position: fixed; right: 22px; bottom: 88px; z-index: 1000;
    width: 340px; max-width: calc(100vw - 44px); height: 460px; max-height: calc(100vh - 130px);
    background: #F3EEE4; border: 1px solid #DCD5C6; border-radius: 16px;
    box-shadow: 0 16px 48px rgba(42,45,37,.22); display: none; flex-direction: column;
    overflow: hidden; font-family: "Inter", system-ui, sans-serif;
  }
  .wl-chat-panel.open { display: flex; }
  .wl-chat-head {
    background: var(--green, #41613A); color: #F6F3EC; padding: 14px 16px;
    font-family: "Fraunces", serif; font-weight: 500; font-size: 16px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .wl-chat-head button { background: none; border: none; color: #F6F3EC; cursor: pointer; font-size: 20px; line-height: 1; }
  .wl-chat-log { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 10px; }
  .wl-msg { max-width: 85%; padding: 10px 13px; border-radius: 13px; font-size: 14px; line-height: 1.45; }
  .wl-msg.bot { background: #FFFFFF; border: 1px solid #DCD5C6; color: #2A2D25; align-self: flex-start; }
  .wl-msg.me { background: var(--green, #41613A); color: #F1EFE7; align-self: flex-end; }
  .wl-msg.note { align-self: center; font-size: 12px; color: #837F6E; background: none; }
  .wl-chat-form { display: flex; gap: 8px; padding: 12px; border-top: 1px solid #DCD5C6; }
  .wl-chat-form input {
    flex: 1; border: 1.5px solid #DCD5C6; background: #FFFFFF; border-radius: 11px;
    padding: 11px 13px; font-size: 14px; font-family: inherit; outline: none; color: #2A2D25;
  }
  .wl-chat-form input:focus { border-color: var(--green, #41613A); }
  .wl-chat-form button {
    border: none; background: var(--green, #41613A); color: #F6F3EC; border-radius: 11px;
    padding: 0 16px; font-weight: 600; cursor: pointer; font-family: inherit;
  }
  @media (prefers-reduced-motion: reduce) { .wl-chat-btn { transition: none; } }
</style>

<button class="wl-chat-btn" id="wlChatBtn" aria-label="Ask WellLens">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-8.5 8.5 8.5 8.5 0 0 1-3.8-.9L3 21l1.9-5.7A8.38 8.38 0 0 1 4 11.5 8.5 8.5 0 0 1 12.5 3 8.38 8.38 0 0 1 21 11.5Z"/></svg>
</button>

<div class="wl-chat-panel" id="wlChatPanel" role="dialog" aria-label="WellLens support chat">
  <div class="wl-chat-head">
    <span>Ask WellLens</span>
    <button id="wlChatClose" aria-label="Close">&times;</button>
  </div>
  <div class="wl-chat-log" id="wlChatLog">
    <div class="wl-msg bot">Hi! I'm the WellLens assistant. Ask me about uploads, insights, plans, or anything else.</div>
  </div>
  <form class="wl-chat-form" id="wlChatForm">
    <input id="wlChatInput" type="text" placeholder="Type your question…" autocomplete="off" maxlength="1500">
    <button type="submit">Send</button>
  </form>
</div>

<script>
  (function () {
    var btn = document.getElementById("wlChatBtn");
    var panel = document.getElementById("wlChatPanel");
    var close = document.getElementById("wlChatClose");
    var log = document.getElementById("wlChatLog");
    var form = document.getElementById("wlChatForm");
    var input = document.getElementById("wlChatInput");
    var history = [];

    function toggle(open) {
      panel.classList.toggle("open", open);
      if (open) input.focus();
    }
    btn.addEventListener("click", function () { toggle(!panel.classList.contains("open")); });
    close.addEventListener("click", function () { toggle(false); });

    function addMsg(text, cls) {
      var el = document.createElement("div");
      el.className = "wl-msg " + cls;
      el.textContent = text;
      log.appendChild(el);
      log.scrollTop = log.scrollHeight;
      return el;
    }

    form.addEventListener("submit", function (e) {
      e.preventDefault();
      var msg = input.value.trim();
      if (!msg) return;
      addMsg(msg, "me");
      history.push({ role: "user", content: msg });
      input.value = "";
      var thinking = addMsg("…", "bot");

      fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: msg, history: history })
      })
        .then(function (r) { return r.json(); })
        .then(function (data) {
          thinking.textContent = data.reply || "Sorry, something went wrong.";
          history.push({ role: "assistant", content: data.reply || "" });
          if (data.escalated) addMsg("This has been passed to our team — they'll follow up.", "note");
        })
        .catch(function () {
          thinking.textContent = "Sorry, I couldn't reach the server. Please try again.";
        });
    });
  })();
</script>
